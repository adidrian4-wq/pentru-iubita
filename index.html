<!DOCTYPE html>
<html>
<head>
<title>Pentru iubita mea ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

h1 {
  color: #ff3366;
  font-size: 45px;
}

p {
  font-size: 22px;
  color: #555;
}

.heart {
  position: absolute;
  color: red;
  font-size: 30px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  from {
    transform: translateY(-100px);
  }
  to {
    transform: translateY(100vh);
  }
}
</style>

</head>

<body>

<div class="card">
<h1>Te iubesc ❤️</h1>

<p>Îmi pare rău că te-am supărat, inima mea frumoasă ❤️</p>

<p>Te iubesc, gurița mea 💕</p>

<p>Ești cea mai specială persoană pentru mine 🥰</p>

</div>


<script>
for(let i=0;i<30;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"%";
 h.style.animationDuration=(3+Math.random()*5)+"s";
 document.body.appendChild(h);
}
</script>

</body>
</html>
